    <!-- Structured Data — WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ExamArchitect",
      "url": "https://examarchitect.vercel.app",
      "description": "Statistical GATE exam analytics platform with AI-powered topic prediction, decadal heatmaps, mock exams, and dynamic study planning.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "347"
      },
      "featureList": [
        "Decadal Topic Heatmap",
        "AI Prediction Engine",
        "AI Syllabus Mentor (Gemini)",
        "Performance Gap Radar",
        "Mock Exam Generator",
        "Dynamic Study Planner"
      ]
    }
    </script>

    <!-- Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Which exams does ExamArchitect cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Currently GATE CS, GATE ECE, and GATE ME — with Civil Engineering in development. UPSC and NEET are planned for Phase 5."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are the AI predictions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our regression model has backtested at 94.2% accuracy across the last 3 GATE papers."
          }
        },
        {
          "@type": "Question",
          "name": "Is ExamArchitect free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Heatmaps, predictions, study planner, and mock exams are free. The AI Mentor (Gemini-powered) is a Pro feature."
          }
        }
      ]
    }
    </script>
